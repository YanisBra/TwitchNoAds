<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwitchNoAds</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
    </div>
    <span class="title">TwitchNoAds</span>
  </div>

  <div class="card">
    <p class="card-label">Bloqueur de publicité</p>
    <div class="status-row">
      <div class="badge" id="statusBadge">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Actif et à jour</span>
      </div>
      <span class="version" id="versionText">v23</span>
    </div>
  </div>

  <div class="card">
    <div class="stat-row">
      <div class="stat-left">
        <span class="stat-num" id="adsCount">0</span>
        <p class="stat-label">Pubs contournées</p>
      </div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
