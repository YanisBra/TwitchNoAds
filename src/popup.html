<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TwitchNoAds</title>
    <style>
        :root {
            --twitch-purple: #9147ff;
            --twitch-purple-dark: #772ce8;
            --bg-color: #0e0e10;
            --card-bg: #1f1f23;
            --text-main: #efeff1;
            --text-muted: #adadb8;
            --border-color: #303032;
        }

        body {
            width: 300px;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .header img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            background-color: transparent;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            background: linear-gradient(90deg, #9147ff, #ff47ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 245, 147, 0.1);
            color: #00f593;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00f593;
            border-radius: 50%;
            box-shadow: 0 0 8px #00f593;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-spinner {
            width: 10px;
            height: 10px;
            border: 2px solid var(--text-muted);
            border-top-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/icon48.png" alt="Logo">
            <h1>TwitchNoAds</h1>
        </div>

        <div class="section">
            <div style="font-size: 14px; font-weight: 500; margin-bottom: 8px;">Bloqueur de publicité</div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Actif et Sécurisé
            </div>
            <div id="script-status" style="margin-top: 14px; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 6px;">
                <span id="status-icon" class="status-spinner"></span>
                <span id="status-text">Recherche de mises à jour...</span>
            </div>
        </div>

        <div id="update-notification" style="display: none; margin-top: 16px; background: rgba(145, 71, 255, 0.1); border: 1px solid var(--twitch-purple); border-radius: 8px; padding: 16px; font-size: 13px; text-align: center;">
            <div style="color: var(--twitch-purple); font-weight: bold; margin-bottom: 6px; font-size: 14px;">Mise à jour disponible !</div>
            <div style="color: var(--text-muted); margin-bottom: 8px;">Locale : v<span id="local-ver">?</span> &rarr; En ligne : v<span id="remote-ver">?</span></div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;">Lancez ce script dans votre terminal pour mettre à jour :</div>
            <code style="background: #000; padding: 6px 8px; border-radius: 4px; display: block; font-family: monospace; user-select: all; cursor: pointer; border: 1px solid var(--border-color); font-size: 11px; color: #ff47ff;" id="update-cmd">.\update.ps1</code>
        </div>

        <div class="footer">
            Stream de façon fluide sans interruption.
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
